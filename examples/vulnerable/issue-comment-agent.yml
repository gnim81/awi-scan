name: vulnerable issue comment agent
on:
  issue_comment:
    types: [created]
permissions:
  issues: write
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - name: Ask agent from comment
        run: |
          claude --prompt "${{ github.event.comment.body }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

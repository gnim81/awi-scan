<svg width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">awi-scan terminal demo</title>
  <desc id="desc">Terminal output showing awi-scan finding agentic workflow injection risks in GitHub Actions workflows.</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#1f2933"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="124%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0b1220" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="920" height="430" fill="#f3f6f8"/>
  <g filter="url(#shadow)">
    <rect x="44" y="38" width="832" height="354" rx="8" fill="url(#frame)"/>
    <rect x="44" y="38" width="832" height="42" rx="8" fill="#17212b"/>
    <rect x="44" y="72" width="832" height="8" fill="#17212b"/>
    <circle cx="72" cy="59" r="6" fill="#ff5f57"/>
    <circle cx="93" cy="59" r="6" fill="#ffbd2e"/>
    <circle cx="114" cy="59" r="6" fill="#28c840"/>
    <text x="460" y="64" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#9fb3c8">awi-scan</text>
  </g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
    <text x="72" y="115" fill="#9fb3c8">$</text>
    <text x="95" y="115" fill="#e4edf5">npx awi-scan examples --format human</text>

    <text x="72" y="157" fill="#e4edf5">awi-scan: </text>
    <text x="178" y="157" fill="#f7c948">3 finding(s)</text>
    <text x="302" y="157" fill="#e4edf5"> in 5 workflow file(s)</text>

    <rect x="72" y="186" width="86" height="24" rx="4" fill="#c2410c"/>
    <text x="84" y="204" fill="#fff7ed" font-size="14" font-weight="700">critical</text>
    <text x="174" y="204" fill="#f8fafc">awi.untrusted-prompt-to-agent</text>
    <text x="72" y="232" fill="#9fb3c8">Untrusted GitHub event content can reach an AI agent with workflow privileges.</text>

    <rect x="72" y="263" width="86" height="24" rx="4" fill="#c2410c"/>
    <text x="84" y="281" fill="#fff7ed" font-size="14" font-weight="700">critical</text>
    <text x="174" y="281" fill="#f8fafc">awi.untrusted-checkout-to-agent</text>
    <text x="72" y="309" fill="#9fb3c8">An AI agent can run after untrusted pull request code is checked out.</text>

    <rect x="72" y="340" width="50" height="24" rx="4" fill="#b45309"/>
    <text x="84" y="358" fill="#fffbeb" font-size="14" font-weight="700">high</text>
    <text x="138" y="358" fill="#f8fafc">awi.untrusted-prompt-to-agent</text>
  </g>
</svg>
